<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Укладка плитки</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            background: #f5f5f5;
        }
        header {
            background: #333;
            color: white;
            padding: 20px;
        }
        .container {
            padding: 40px;
        }
        button {
            display: block;
            width: 250px;
            margin: 15px auto;
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            background: #007BFF;
            color: white;
            border-radius: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        .page {
            display: none;
        }
    </style>
</head>
<body>

<header>
    <h1>Укладка плитки</h1>
</header>

<div class="container">

    <!-- Главная -->
    <div id="home" class="page" style="display:block;">
        <button onclick="showPage('bathroom')">Плитка в ванную</button>
        <button onclick="showPage('kitchen')">Плитка на кухню</button>
        <button onclick="showPage('prices')">Цены</button>
        <button onclick="showPage('contacts')">Контакты</button>
    </div>

    <!-- Страницы -->
    <div id="bathroom" class="page">
        <h2>Плитка в ванную</h2>
        <button onclick="showPage('home')">На главную</button>
    </div>

    <div id="kitchen" class="page">
        <h2>Плитка на кухню</h2>
        <button onclick="showPage('home')">На главную</button>
    </div>

    <div id="prices" class="page">
        <h2>Цены</h2>
        <button onclick="showPage('home')">На главную</button>
    </div>

    <div id="contacts" class="page">
        <h2>Контакты</h2>
        <button onclick="showPage('home')">На главную</button>
    </div>

</div>

<script>
    function showPage(pageId) {
        let pages = document.querySelectorAll('.page');
        pages.forEach(page => page.style.display = 'none');

        document.getElementById(pageId).style.display = 'block';
    }
</script>

</body>
</html>
